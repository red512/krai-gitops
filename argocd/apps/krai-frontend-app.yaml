apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: krai-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/red512/krai-gitops
    targetRevision: HEAD
    path: helm/krai-frontend-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: krai-frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
