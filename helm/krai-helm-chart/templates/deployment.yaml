apiVersion: apps/v1
kind: Deployment
metadata:
  name: krai
  labels:
    app: krai
    component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: krai
      component: api
  template:
    metadata:
      labels:
        app: krai
        component: api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: krai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GCS_BUCKET
              value: {{ .Values.env.GCS_BUCKET | quote }}
            - name: PUBSUB_TOPIC
              value: {{ .Values.env.PUBSUB_TOPIC | quote }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: krai-secrets
                  key: API_KEY
            - name: GOOGLE_CLIENT_ID
              value: {{ .Values.env.GOOGLE_CLIENT_ID | quote }}
            - name: GOOGLE_CLOUD_PROJECT
              value: {{ .Values.env.GOOGLE_CLOUD_PROJECT | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
      volumes:
        - name: tmp
          emptyDir: {}
